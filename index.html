<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reinier | Fine Art Photography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=AbC_Y_PpmDzqC4JgrvFPRAfq1E47EZKquXmM6OP_Bzs7S-2aRf-gG2RuDraHkKPitOrFbmoHqDhTeFYL&currency=EUR&components=buttons,funding-eligibility"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@100;200;300;400&display=swap');
        
        :root {
            --bg-deep: #080808;
            --ivory: #f2f2f2;
            --accent: #a69f88; 
        }

        * { cursor: none !important; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-deep);
            color: var(--ivory);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        h1, h2, h3, .serif-font {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
        }

        /* Cursor */
        #custom-cursor {
            width: 8px; height: 8px; background: var(--ivory);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
            transition: transform 0.1s ease;
        }
        #cursor-follower {
            width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998;
            transition: transform 0.15s ease;
        }

        /* Efectos de Galería */
        .artwork-card { position: relative; overflow: hidden; }
        .artwork-image {
            filter: grayscale(100%) brightness(0.7);
            transition: all 1.2s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .artwork-card:hover .artwork-image {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.03);
        }

        /* Modal Rediseñado para visibilidad */
        .modal-overlay {
            display: none;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
        }

        .modal-content-container {
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 1024px) {
            .modal-content-container {
                flex-direction: row;
                height: 80vh;
            }
        }

        .modal-scroll-area {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        /* UI Elements */
        .thin-border { border: 0.5px solid rgba(255,255,255,0.1); }
        .nav-link { font-size: 0.6rem; letter-spacing: 0.4em; transition: color 0.3s ease; }
        .nav-link:hover { color: var(--accent); }

        .btn-luxury {
            position: relative; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.3);
            padding: 1rem 2rem; font-size: 9px; letter-spacing: 0.4em;
            text-transform: uppercase; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            background: transparent; color: white; width: 100%;
        }
        .btn-luxury:hover { background: white; color: black; }

        .cart-sidebar {
            background: #0a0a0a; width: 400px; right: -400px; z-index: 200;
            transition: right 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .artwork-container { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .artwork-container.active { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            #custom-cursor, #cursor-follower { display: none; }
            * { cursor: auto !important; }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="cursor-follower"></div>

    <nav class="fixed w-full top-0 z-50 py-4 px-6 lg:px-12 flex justify-between items-center bg-black/50 backdrop-blur-md">
        <div class="flex flex-col group">
            <span class="text-xl tracking-[0.3em] serif-font italic">REINIER</span>
            <span class="text-[0.4rem] tracking-[0.5em] text-gray-500 uppercase -mt-1">Fine Art</span>
        </div>
        
        <div class="hidden md:flex space-x-10">
            <a href="#inicio" class="nav-link">INICIO</a>
            <a href="#manifiesto" class="nav-link">AUTOR</a>
            <a href="#galeria" class="nav-link">COLECCIÓN</a>
        </div>

        <button onclick="toggleCart()" class="relative">
            <span id="cartCount" class="absolute -top-2 -right-2 text-[8px] text-accent">00</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0" />
            </svg>
        </button>
    </nav>

    <!-- Hero -->
    <section id="inicio" class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1493397212122-2b85def8d0b0?q=80&w=2070" 
                 class="w-full h-full object-cover opacity-30" id="hero-img" alt="Background">
        </div>
        <div class="container mx-auto px-6 z-10 text-center">
            <h1 class="text-6xl lg:text-9xl serif-font mb-8 animate__animated animate__fadeInUp">
                El Silencio <br><span class="italic text-accent">Visual</span>
            </h1>
            <a href="#galeria" class="btn-luxury inline-block w-auto px-12">Ver Galería</a>
        </div>
    </section>

    <!-- Galería -->
    <section id="galeria" class="py-32 px-6 lg:px-20">
        <div id="gallery-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-12">
            <!-- JS Inject -->
        </div>
    </section>

    <!-- MODAL OPTIMIZADO -->
    <div id="shopModal" class="modal-overlay fixed inset-0 z-[100] flex items-center justify-center p-4 lg:p-10" onclick="if(event.target === this) closeShop()">
        <div class="bg-[#0c0c0c] w-full max-w-5xl modal-content-container thin-border shadow-2xl relative">
            
            <!-- Botón Cerrar fijo -->
            <button onclick="closeShop()" class="absolute top-4 right-4 z-[110] text-gray-400 hover:text-white p-2">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>

            <!-- Lado Imagen: se ajusta al alto del modal -->
            <div class="w-full lg:w-3/5 h-[40vh] lg:h-auto overflow-hidden">
                <img id="modalImg" src="" class="w-full h-full object-cover">
            </div>

            <!-- Lado Contenido: Con Scroll Propio -->
            <div class="w-full lg:w-2/5 p-6 lg:p-10 flex flex-col modal-scroll-area">
                <span class="text-[8px] uppercase tracking-[0.6em] text-accent mb-2">Edición Limitada</span>
                <h2 id="modalTitle" class="text-3xl lg:text-4xl serif-font italic mb-4">Título</h2>
                <p id="modalDesc" class="text-gray-500 font-extralight text-xs leading-relaxed mb-8 italic border-l border-accent/30 pl-4">Descripción...</p>

                <div class="space-y-8">
                    <div>
                        <label class="text-[8px] uppercase tracking-widest text-gray-500 block mb-2">Seleccionar Formato</label>
                        <select id="sizeSelector" onchange="updatePrice()" class="w-full bg-transparent border-b border-white/10 py-3 outline-none text-xs appearance-none">
                            <option value="85" data-size="30x45 (Fine Art)">30x45 cm — 85€</option>
                            <option value="155" data-size="50x75 (Premium Cotton)">50x75 cm — 155€</option>
                            <option value="290" data-size="70x105 (Museum Archival)">70x105 cm — 290€</option>
                        </select>
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="w-24">
                            <label class="text-[8px] uppercase tracking-widest text-gray-500 block mb-2">Cantidad</label>
                            <div class="flex items-center border-b border-white/10 py-1 text-xs">
                                <button onclick="changeQty('modalQty', -1)" class="px-2 text-gray-500">-</button>
                                <input type="number" id="modalQty" value="1" class="bg-transparent w-full text-center outline-none" readonly>
                                <button onclick="changeQty('modalQty', 1)" class="px-2 text-gray-500">+</button>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-[8px] uppercase tracking-widest text-gray-500 block">Total</span>
                            <span id="finalPrice" class="text-3xl serif-font italic text-accent">85€</span>
                        </div>
                    </div>

                    <div class="pt-4">
                        <button onclick="addToCart()" class="btn-luxury bg-white !text-black hover:!bg-accent hover:!text-white">
                            Añadir a la Colección
                        </button>
                        <p class="text-[7px] uppercase tracking-widest text-gray-600 text-center mt-4">
                            Envío asegurado en caja de madera reforzada
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Carrito Sidebar -->
    <div id="cartSidebar" class="cart-sidebar fixed top-0 h-full p-8 flex flex-col shadow-2xl border-l border-white/5">
        <div class="flex justify-between items-center mb-12">
            <h3 class="serif-font italic text-xl">Su Selección</h3>
            <button onclick="toggleCart()" class="text-[8px] tracking-[0.3em] uppercase opacity-50">Cerrar</button>
        </div>
        <div id="cartItems" class="flex-grow space-y-8 overflow-y-auto pr-2"></div>
        <div class="pt-8 border-t border-white/5 mt-8">
            <div class="flex justify-between mb-6">
                <span class="text-[8px] uppercase tracking-widest text-gray-500">Inversión Total</span>
                <span id="cartTotal" class="text-2xl serif-font italic text-accent">0€</span>
            </div>
            <button onclick="openCheckout()" class="btn-luxury bg-white !text-black">Finalizar Compra</button>
        </div>
    </div>

    <script>
        const photos = [
            { title: "Quietud en los Alpes", url: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1200", price: 85, desc: "Captura de la bruma sobre picos graníticos. Impresión en papel de algodón de 308g." },
            { title: "Geometría de Acero", url: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200", price: 95, desc: "Minimalismo arquitectónico. Un estudio sobre el orden y la luz proyectada." },
            { title: "El Horizonte Azul", url: "https://images.unsplash.com/photo-1505118380757-91f5f5632de0?q=80&w=1200", price: 85, desc: "La línea infinita donde el cielo encuentra el mar. Serie limitada numerada." },
            { title: "Vientre de Roca", url: "https://images.unsplash.com/photo-1554048612-b6a482bc67e5?q=80&w=2070", price: 120, desc: "Texturas orgánicas en cañones subterráneos. Profundidad visual extrema." }
        ];

        let cart = [];

        // Cursor
        const cursor = document.getElementById('custom-cursor');
        const follower = document.getElementById('cursor-follower');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            follower.style.left = (e.clientX - 20) + 'px';
            follower.style.top = (e.clientY - 20) + 'px';
        });

        // Galería
        function initGallery() {
            const grid = document.getElementById('gallery-grid');
            photos.forEach((photo, index) => {
                grid.innerHTML += `
                    <div class="artwork-card artwork-container group cursor-pointer" onclick="openShop(${index})">
                        <div class="relative overflow-hidden aspect-[3/4] thin-border">
                            <img src="${photo.url}" class="artwork-image w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <span class="text-[8px] uppercase tracking-[0.5em] border border-white/20 px-4 py-2">Detalles</span>
                            </div>
                        </div>
                        <div class="mt-6 flex justify-between items-baseline">
                            <h3 class="serif-font italic text-xl">${photo.title}</h3>
                            <span class="text-[9px] text-accent">${photo.price}€</span>
                        </div>
                    </div>
                `;
            });
            handleScroll();
        }

        function handleScroll() {
            document.querySelectorAll(".artwork-container").forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add("active");
            });
        }
        window.addEventListener("scroll", handleScroll);

        // Shop Functions
        function openShop(index) {
            const p = photos[index];
            document.getElementById('modalTitle').innerText = p.title;
            document.getElementById('modalImg').src = p.url;
            document.getElementById('modalDesc').innerText = p.desc;
            document.getElementById('modalQty').value = 1;
            document.getElementById('shopModal').style.display = 'flex';
            updatePrice();
        }

        function closeShop() { document.getElementById('shopModal').style.display = 'none'; }

        function changeQty(id, delta) {
            const input = document.getElementById(id);
            let val = parseInt(input.value) + delta;
            if(val >= 1) {
                input.value = val;
                updatePrice();
            }
        }

        function updatePrice() {
            const sel = document.getElementById('sizeSelector');
            const base = parseInt(sel.value);
            const qty = parseInt(document.getElementById('modalQty').value);
            document.getElementById('finalPrice').innerText = (base * qty) + '€';
        }

        function addToCart() {
            const sel = document.getElementById('sizeSelector');
            cart.push({
                id: Date.now(),
                title: document.getElementById('modalTitle').innerText,
                img: document.getElementById('modalImg').src,
                price: parseInt(sel.value),
                qty: parseInt(document.getElementById('modalQty').value),
                size: sel.options[sel.selectedIndex].getAttribute('data-size')
            });
            updateCartUI();
            closeShop();
            toggleCart();
        }

        function toggleCart() {
            const s = document.getElementById('cartSidebar');
            s.style.right = (s.style.right === '0px') ? '-400px' : '0px';
        }

        function updateCartUI() {
            const container = document.getElementById('cartItems');
            let total = 0, count = 0;
            container.innerHTML = '';
            cart.forEach(item => {
                total += (item.price * item.qty);
                count += item.qty;
                container.innerHTML += `
                    <div class="flex gap-4 items-center">
                        <img src="${item.img}" class="w-12 h-16 object-cover grayscale">
                        <div class="flex-grow">
                            <h4 class="text-[9px] uppercase tracking-widest">${item.title}</h4>
                            <p class="text-[7px] text-gray-500 uppercase">${item.size} x${item.qty}</p>
                            <p class="text-[9px] text-accent mt-1">${item.price * item.qty}€</p>
                        </div>
                        <button onclick="removeFromCart(${item.id})" class="text-xs opacity-30 hover:opacity-100">×</button>
                    </div>
                `;
            });
            document.getElementById('cartCount').innerText = count.toString().padStart(2, '0');
            document.getElementById('cartTotal').innerText = total + '€';
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        window.onload = initGallery;
    </script>
</body>
</html>
